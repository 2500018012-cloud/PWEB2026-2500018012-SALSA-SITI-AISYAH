<!DOCTYPE html>
<html>
<head>
    <title>Contoh Tabel HTML</title>
</head>
<body>

    <h2 align="center">Ini adalah tabel</h2>

    <table border="1" cellpadding="8" cellspacing="0" align="center">
        <caption><b>Tabel Data Mahasiswa</b></caption>

        <!-- Header -->
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Kelas</th>
            <th>NIM</th>
        </tr>

        <!-- Baris 1 -->
        <tr>
            <td>1</td>
            <td>Salsa</td>
            <td>A</td>
            <td>12345</td>
        </tr>

        <!-- Baris 2 -->
        <tr>
            <td>2</td>
            <td>Andi</td>
            <td>B</td>
            <td>67890</td>
        </tr>

        <!-- Baris 3 -->
        <tr>
            <td>3</td>
            <td>Budi</td>
            <td>A</td>
            <td>11223</td>
        </tr>

        <!-- Tambahan baris -->
        <tr>
            <td>4</td>
            <td>Siti</td>
            <td>C</td>
            <td>44556</td>
        </tr>

    </table>

</body>
</html>
