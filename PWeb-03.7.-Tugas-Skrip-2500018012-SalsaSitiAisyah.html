<!DOCTYPE html>
<html>
<head>
    <title>Superscript dan Subscript</title>
</head>
<body>

    <h2>Contoh Superscript dan Subscript</h2>

    <!-- Contoh matematika -->
    <p>
        Rumus matematika:<br>
        (x<sub>1</sub> + x<sub>2</sub>)<sup>2</sup> = 
        x<sub>1</sub><sup>2</sup> + x<sub>2</sub><sup>2</sup> + 2x<sub>1</sub>x<sub>2</sub>
    </p>

    <!-- Contoh kimia -->
    <p>
        Rumus kimia:<br>
        2H<sub>2</sub> + O<sub>2</sub> = 2H<sub>2</sub>O
    </p>

    <!-- Contoh tambahan -->
    <p>
        Saya belajar HTML versi ke-2<sup>nd</sup> dan membuat H<sub>2</sub>O.<br>
        Luas persegi = s<sup>2</sup><br>
        Volume kubus = s<sup>3</sup>
    </p>

</body>
</html>
